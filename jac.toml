[project]
name = "maizemind-juncture"
version = "1.0.0"
description = "Jac client application: maizemind-juncture"
entry-point = "main.jac"

[dependencies]

[dependencies.npm]
jac-client-node = "1.0.4"
lucide-react = "^0.483.0"
pdfjs-dist = "^4.0.0"
mammoth = "^1.8.0"
d3-force = "^3.0.0"

[dependencies.npm.dev]
"@jac-client/dev-deps" = "1.0.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"

[plugins.client]
debug = true

[plugins.byllm.model]
default_model = "ollama/minimax-m2.5:cloud"
verbose = true

[plugins.byllm.call_params]
temperature = 0.3
max_tokens = 1500

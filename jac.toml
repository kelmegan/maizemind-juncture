[project]
name = "maizemind-juncture"
version = "1.0.0"
description = "Jac client application: maizemind-juncture"
entry-point = "main.jac"

[dependencies.npm]
lucide-react = "^0.483.0"
pdfjs-dist = "^4.0.0"
mammoth = "^1.8.0"
d3-force = "^3.0.0"
jspdf = "latest"
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"

[plugins.client]
debug = true

[plugins.byllm.model]
default_model = "anthropic/claude-sonnet-4-6"
verbose = true

[plugins.byllm.call_params]
temperature = 0.3
max_tokens = 1500

[plugins.scale.kubernetes]
namespace = "maizemind-juncture"
domain = "maizemind.com"
cert_manager_email = "maya.hillegonds1@gmail.com"

[plugins.scale.secrets]
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"
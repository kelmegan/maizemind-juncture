[project]
name = "maizemind-juncture"
version = "1.0.0"
description = "Jac client application: maizemind-juncture"
entry-point = "main.jac"

[dependencies.npm]
jac-client-node = "1.0.7"
lucide-react = "^0.483.0"
pdfjs-dist = "^4.0.0"
mammoth = "^1.8.0"
d3-force = "^3.0.0"
jspdf = "latest"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.55.0"
"@hookform/resolvers" = "^3.10.0"
zod = "^3.24.1"

[dependencies.npm.dev]
"@jac-client/dev-deps" = "2.0.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"

[plugins.client]
debug = true

[plugins.byllm.model]
default_model = "ollama/llama3.1"
base_url = "http://127.0.0.1:11434"
verbose = true

[plugins.byllm.call_params]
temperature = 0.3
max_tokens = 1500

[plugins.scale.kubernetes]
domain = "maizemind.com"
cert_manager_email = "maya.hillegonds1@gmail.com"
